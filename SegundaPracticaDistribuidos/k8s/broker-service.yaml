# -- SERVICE --

apiVersion: v1       # versión de la API de Kubernetes para Deployments
kind: Service          # tipo de objeto

metadata:
  name: broker-service

spec:
  selector:
    app: broker
  ports: 
    - port: 32002     # Puerto del Servicio
      targetPort: 32002 # Puerto del contenedor
      nodePort: 32002 # Puerto por el que se conectara al nodo
  type: NodePort # Usamos un Service del tipo NodePort porque:
                # NodePort abre un puerto en el nodo worker (172.31.81.126:32002)
                # que sí es alcanzable desde cualquier máquina del VPC

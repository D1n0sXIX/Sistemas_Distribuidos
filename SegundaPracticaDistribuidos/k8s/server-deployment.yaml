# -- DEPLOYMENT --
# Un Deployment le dice a Kubernetes: "quiero que este pod esté siempre corriendo"

apiVersion: apps/v1       # versión de la API de Kubernetes para Deployments
kind: Deployment          # tipo de objeto

metadata:
  name: server-deployment   # nombre del Deployment




spec:
  replicas: 2               # cuántas copias del pod quieremos
  strategy:
    type: Recreate
  selector:               # cómo encuentra Kubernetes los pods que gestiona este Deployment
    matchLabels:
      app: server               # debe coincidir con la etiqueta de abajo
  template:               # plantilla del pod que se va a crear
    metadata:
      labels:
        app: server       # Etiqueta del pod
    spec:
        volumes:
        - name: filemanagerdir
          persistentVolumeClaim:
            claimName: nfs-pvc
        containers:
          - name: server          # nombre del contenedor
            volumeMounts:
              - name: filemanagerdir
                mountPath: /FileManagerDir
            image: d1n0s/p2-server:latest        # imagen Docker a usar
            env:
            - name: MY_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            command: ["/bin/sh", "-c"]
            args: ["/serverFileManager 10.111.182.40 32002 $MY_NODE_IP 32001"]
            ports:
              - containerPort: 32001
          
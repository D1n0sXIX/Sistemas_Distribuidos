# -- DEPLOYMENT --
# Un Deployment le dice a Kubernetes: "quiero que este pod esté siempre corriendo"

apiVersion: apps/v1       # versión de la API de Kubernetes para Deployments
kind: Deployment          # tipo de objeto

metadata:
  name: broker-deployment   # nombre del Deployment (ej: broker-deployment)

spec:
  replicas: 1               # cuántas copias del pod quieremos

  selector:               # cómo encuentra Kubernetes los pods que gestiona este Deployment
    matchLabels:
      app: broker               # debe coincidir con la etiqueta de abajo (ej: broker)

  template:               # plantilla del pod que se va a crear
    metadata:
      labels:
        app: broker             # etiqueta del pod — debe coincidir con selector.matchLabels.app

    spec:
      containers:
        - name: broker          # nombre del contenedor (ej: broker)
          image: d1n0s/p2-broker:latest        # imagen Docker a usar (ej: d1n0s/p2-broker:latest)
          ports:
            - containerPort: 32002   # puerto que expone el contenedor (ej: 32002)
